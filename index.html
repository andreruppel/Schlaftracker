
<h2 class="sr-only">Schlaf-Dragonborn v4 — Schlaf-thematische Level-Namen</h2>
<style>
  .sd-xp-outer{height:8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;overflow:hidden;margin:5px 0 2px}
  .sd-xp-inner{height:100%;background:#7F77DD;border-radius:6px;transition:width .7s ease}
  .sd-quest{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;user-select:none;transition:background .15s}
  .sd-quest:hover:not(.sd-locked){background:var(--color-background-secondary)}
  .sd-quest.sd-locked{cursor:default}
  .sd-quest.sd-qok .sd-chk{background:#7F77DD;border-color:#7F77DD}
  .sd-chk{width:20px;height:20px;border:1.5px solid var(--color-border-secondary);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
  .sd-pill{margin-left:auto;font-size:12px;font-weight:500;padding:2px 8px;border-radius:12px;white-space:nowrap;flex-shrink:0}
  .sd-pill-main{color:#534AB7;background:#EEEDFE}
  .sd-pill-side{color:var(--color-text-secondary);background:var(--color-background-secondary)}
  @media(prefers-color-scheme:dark){.sd-pill-main{color:#AFA9EC;background:#26215C}}
  .sd-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
  .sd-btn{width:100%;padding:12px;background:#534AB7;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:15px;font-weight:500;cursor:pointer;transition:background .15s,transform .1s}
  .sd-btn:hover:not(:disabled){background:#3C3489}
  .sd-btn:active:not(:disabled){transform:scale(.98)}
  .sd-btn:disabled{background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:default;border:0.5px solid var(--color-border-tertiary)}
  .sd-lbl{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin:0 0 8px}
  .sd-stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 8px;text-align:center}
  .sd-toast{border-radius:var(--border-radius-md);padding:10px 14px;font-size:14px;font-weight:500;text-align:center;margin-bottom:16px;display:none;background:var(--color-background-success);color:var(--color-text-success)}
  .sd-mult{border-radius:var(--border-radius-md);padding:8px 12px;font-size:13px;display:none;align-items:center;gap:8px;margin-bottom:16px;background:#EEEDFE;color:#534AB7}
  @media(prefers-color-scheme:dark){.sd-mult{background:#26215C;color:#AFA9EC}}
  .sd-avatar{width:46px;height:46px;border-radius:50%;background:#EEEDFE;border:0.5px solid #AFA9EC;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  @media(prefers-color-scheme:dark){.sd-avatar{background:#26215C;border-color:#3C3489}}
  .sd-divider{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin:12px 0 8px;padding-left:2px}
</style>

<div style="padding:1rem 0">
  <div class="sd-toast" id="sd-toast"></div>

  <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
    <div class="sd-avatar">
      <i class="ti ti-moon-stars" style="font-size:22px;color:#534AB7" aria-hidden="true"></i>
    </div>
    <div style="flex:1;min-width:0">
      <p style="margin:0;font-size:15px;font-weight:500;color:var(--color-text-primary)" id="sd-lvname">Level 1 · Nachtschatten</p>
      <p style="margin:0;font-size:12px;color:var(--color-text-secondary)" id="sd-lvsub">Noch im Dunkel des alten Rhythmus</p>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <p style="margin:0;font-size:26px;font-weight:500;color:#534AB7" id="sd-streak">0</p>
      <p style="margin:0;font-size:11px;color:var(--color-text-secondary)">Streak 🔥</p>
    </div>
  </div>

  <div style="margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary)">
      <span id="sd-xplbl">0 XP</span><span id="sd-xpnxt"></span>
    </div>
    <div class="sd-xp-outer"><div class="sd-xp-inner" id="sd-xpbar" style="width:0%"></div></div>
  </div>

  <div class="sd-mult" id="sd-mult">
    <i class="ti ti-bolt" style="font-size:15px" aria-hidden="true"></i>
    <span id="sd-multtxt"></span>
  </div>

  <div id="sd-qlist"></div>

  <button class="sd-btn" id="sd-btn" onclick="sdCommit()" style="margin-top:4px">Tag abschliessen</button>

  <div style="margin-top:24px">
    <p class="sd-lbl">Letzte 14 Tage</p>
    <div id="sd-hist" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:20px">
    <div class="sd-stat">
      <p style="margin:0;font-size:20px;font-weight:500;color:var(--color-text-primary)" id="st-xp">0</p>
      <p style="margin:0;font-size:11px;color:var(--color-text-secondary)">Gesamt-XP</p>
    </div>
    <div class="sd-stat">
      <p style="margin:0;font-size:20px;font-weight:500;color:var(--color-text-primary)" id="st-days">0</p>
      <p style="margin:0;font-size:11px;color:var(--color-text-secondary)">Tage geloggt</p>
    </div>
    <div class="sd-stat">
      <p style="margin:0;font-size:20px;font-weight:500;color:var(--color-text-primary)" id="st-best">0</p>
      <p style="margin:0;font-size:11px;color:var(--color-text-secondary)">Längster Streak</p>
    </div>
  </div>

  <div style="margin-top:16px;text-align:center">
    <button onclick="if(confirm('Experiment zurücksetzen?'))sdReset()" style="background:none;border:none;font-size:12px;color:var(--color-text-tertiary);cursor:pointer;padding:4px">
      Experiment zurücksetzen
    </button>
  </div>
</div>

<script>
const QS=[
  {id:'wake', ic:'ti-alarm',  lb:'06:30 aufgestanden',      sb:'Zirkadianer Anker',          xp:30, main:true},
  {id:'light',ic:'ti-sun',    lb:'Morgenlicht bekommen',     sb:'5 / 10 / 20 min je Wetter', xp:30, main:true},
  {id:'bed',  ic:'ti-moon',   lb:'Vor 22:30 eingeschlafen',  sb:'8h Schlaffenster',           xp:30, main:true},
  {id:'caff', ic:'ti-coffee', lb:'Koffein-Stop vor 13:00',   sb:'Nebenquest · Tiefschlaf',   xp:10, main:false},
  {id:'nsdr', ic:'ti-zzz',    lb:'NSDR oder kurzer Nap',     sb:'Nebenquest · max. 25 min',  xp:10, main:false},
];
const LV=[
  {mn:0,    mx:499,  n:1, nm:'Nachtschatten',    sb:'Noch im Dunkel des alten Rhythmus'},
  {mn:500,  mx:1099, n:2, nm:'Morgendämmer',      sb:'Das erste Licht bricht durch'},
  {mn:1100, mx:2199, n:3, nm:'Sonnenwächter',     sb:'Du holst dir das Morgenlicht'},
  {mn:2200, mx:4199, n:4, nm:'Rhythmushüter',     sb:'Dein Körper kennt die Zeit'},
  {mn:4200, mx:7499, n:5, nm:'Traumschmied',      sb:'Du formst deinen Schlaf bewusst'},
  {mn:7500, mx:1e9,  n:6, nm:'Schlaf-Dragonborn', sb:'Du und der Sonnenrhythmus sind eins'},
];
const ML=[{s:21,m:2.0,l:'×2.0'},{s:14,m:1.75,l:'×1.75'},{s:7,m:1.5,l:'×1.5'},{s:3,m:1.25,l:'×1.25'}];

let G={xp:0,streak:0,best:0,last:null,grace:false,hist:[]};
let TQ={};

const tday=()=>new Date().toISOString().split('T')[0];
const ddiff=(a,b)=>Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/864e5);
const glv=x=>LV.slice().reverse().find(l=>x>=l.mn)||LV[0];
const gml=s=>ML.find(m=>s>=m.s)||null;
const dlb=d=>['So','Mo','Di','Mi','Do','Fr','Sa'][new Date(d+'T12:00:00').getDay()];

async function sdLoad(){
  try{const r=await window.storage.get('sdrg3');if(r)G={...G,...JSON.parse(r.value)};}catch(e){}
  try{const r=await window.storage.get('sdrt3');if(r){const t=JSON.parse(r.value);if(t.d===tday())TQ=t.q||{};}}catch(e){}
  if(G.last&&G.last!==tday()&&ddiff(G.last,tday())>2){G.streak=0;G.grace=false;}
  sdRender();
}
async function sdSaveG(){try{await window.storage.set('sdrg3',JSON.stringify(G));}catch(e){}}
async function sdSaveT(){try{await window.storage.set('sdrt3',JSON.stringify({d:tday(),q:TQ}));}catch(e){}}

function sdIsDone(){return G.last===tday();}
function sdCalc(){
  const base=QS.reduce((s,q)=>s+(TQ[q.id]?q.xp:0),0);
  const ml=gml(G.streak||0);
  return{base,fin:ml?Math.round(base*ml.m):base,ml};
}
function sdToggle(id){
  if(sdIsDone())return;
  TQ[id]=!TQ[id];
  sdSaveT();
  sdRender();
}
async function sdCommit(){
  if(sdIsDone())return;
  const t=tday();
  const{fin,base}=sdCalc();
  if(!G.last){G.streak=1;}
  else{
    const df=ddiff(G.last,t);
    if(df===1){G.streak++;G.grace=false;}
    else if(df===2&&!G.grace){G.streak++;G.grace=true;}
    else{G.streak=1;G.grace=false;}
  }
  G.best=Math.max(G.best||0,G.streak);
  G.xp=(G.xp||0)+fin;
  G.last=t;
  G.hist=G.hist||[];
  G.hist.push({d:t,xp:fin,base,ok:QS.filter(q=>TQ[q.id]).length,tot:QS.length});
  if(G.hist.length>60)G.hist=G.hist.slice(-60);
  await sdSaveG();
  const el=document.getElementById('sd-toast');
  el.textContent=`+${fin} XP verdient! Streak: ${G.streak} Tage 🔥`;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
  sdRender();
}
async function sdReset(){
  G={xp:0,streak:0,best:0,last:null,grace:false,hist:[]};TQ={};
  try{await window.storage.set('sdrg3',JSON.stringify(G));}catch(e){}
  try{await window.storage.set('sdrt3',JSON.stringify({d:tday(),q:{}}));}catch(e){}
  sdRender();
}
function sdRender(){
  const done=sdIsDone();
  const lv=glv(G.xp||0);
  const ml=gml(G.streak||0);
  document.getElementById('sd-lvname').textContent=`Level ${lv.n} · ${lv.nm}`;
  document.getElementById('sd-lvsub').textContent=lv.sb;
  document.getElementById('sd-streak').textContent=G.streak||0;
  document.getElementById('sd-xplbl').textContent=`${G.xp||0} XP`;
  if(lv.n<LV.length){
    document.getElementById('sd-xpbar').style.width=Math.min(100,((G.xp||0)-lv.mn)/(lv.mx-lv.mn)*100)+'%';
    document.getElementById('sd-xpnxt').textContent=`→ ${LV[lv.n].nm} bei ${lv.mx+1} XP`;
  }else{
    document.getElementById('sd-xpbar').style.width='100%';
    document.getElementById('sd-xpnxt').textContent='· Schlaf-Dragonborn erreicht ·';
  }
  const mb=document.getElementById('sd-mult');
  if(ml&&!done){mb.style.display='flex';document.getElementById('sd-multtxt').textContent=`Streak-Bonus aktiv: ${ml.l} auf alle heutigen XP`;}
  else{mb.style.display='none';}

  const ql=document.getElementById('sd-qlist');
  ql.innerHTML='';
  const{ml:cm}=sdCalc();
  const mainQ=QS.filter(q=>q.main);
  const sideQ=QS.filter(q=>!q.main);

  const mDiv=document.createElement('div');
  mDiv.innerHTML='<p class="sd-divider">Hauptquests · 30 XP</p>';
  const mList=document.createElement('div');
  mList.style.cssText='display:flex;flex-direction:column;gap:8px';
  mainQ.forEach(q=>{
    const ok=!!TQ[q.id];
    const xpd=cm?Math.round(q.xp*cm.m):q.xp;
    const r=document.createElement('div');
    r.className='sd-quest'+(ok?' sd-qok':'')+(done?' sd-locked':'');
    if(!done)r.onclick=()=>sdToggle(q.id);
    r.innerHTML=`<div class="sd-chk">${ok?'<i class="ti ti-check" style="font-size:12px;color:#fff" aria-hidden="true"></i>':''}</div><i class="ti ${q.ic}" style="font-size:17px;color:var(--color-text-secondary)" aria-hidden="true"></i><div style="flex:1;min-width:0"><p style="margin:0;font-size:14px;font-weight:500;color:var(--color-text-primary)">${q.lb}</p><p style="margin:0;font-size:12px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${q.sb}</p></div><span class="sd-pill sd-pill-main">+${xpd} XP</span>`;
    mList.appendChild(r);
  });
  mDiv.appendChild(mList);
  ql.appendChild(mDiv);

  const sDiv=document.createElement('div');
  sDiv.innerHTML='<p class="sd-divider" style="margin-top:16px">Nebenquests · 10 XP</p>';
  const sList=document.createElement('div');
  sList.style.cssText='display:flex;flex-direction:column;gap:8px;margin-bottom:16px';
  sideQ.forEach(q=>{
    const ok=!!TQ[q.id];
    const xpd=cm?Math.round(q.xp*cm.m):q.xp;
    const r=document.createElement('div');
    r.className='sd-quest'+(ok?' sd-qok':'')+(done?' sd-locked':'');
    if(!done)r.onclick=()=>sdToggle(q.id);
    r.innerHTML=`<div class="sd-chk">${ok?'<i class="ti ti-check" style="font-size:12px;color:#fff" aria-hidden="true"></i>':''}</div><i class="ti ${q.ic}" style="font-size:17px;color:var(--color-text-secondary)" aria-hidden="true"></i><div style="flex:1;min-width:0"><p style="margin:0;font-size:14px;font-weight:500;color:var(--color-text-primary)">${q.lb}</p><p style="margin:0;font-size:12px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${q.sb}</p></div><span class="sd-pill sd-pill-side">+${xpd} XP</span>`;
    sList.appendChild(r);
  });
  sDiv.appendChild(sList);
  ql.appendChild(sDiv);

  const btn=document.getElementById('sd-btn');
  if(done){
    const h=(G.hist||[]).find(h=>h.d===tday());
    btn.textContent=h?`✓ Tag abgeschlossen · +${h.xp} XP`:'✓ Tag abgeschlossen';
    btn.disabled=true;
  }else{
    const{fin}=sdCalc();
    btn.textContent=fin>0?`Tag abschliessen · +${fin} XP`:'Tag abschliessen';
    btn.disabled=false;
  }

  const hc=document.getElementById('sd-hist');
  hc.innerHTML='';
  const t=tday();
  for(let i=13;i>=0;i--){
    const nd=new Date();nd.setDate(nd.getDate()-i);
    const ds=nd.toISOString().split('T')[0];
    const h=(G.hist||[]).find(h=>h.d===ds);
    const isT=ds===t;
    const dot=document.createElement('div');
    let bg,clr,extra='';
    if(h||(isT&&done)){bg='#7F77DD';clr='#fff';}
    else if(isT){bg='transparent';clr='var(--color-text-primary)';extra='border:2px solid #7F77DD;';}
    else{bg='var(--color-background-secondary)';clr='var(--color-text-tertiary)';}
    dot.className='sd-dot';
    dot.style.cssText=`background:${bg};color:${clr};${extra}`;
    dot.title=h?`${ds}: +${h.xp} XP, ${h.ok}/${h.tot} Quests`:ds;
    dot.textContent=dlb(ds);
    hc.appendChild(dot);
  }
  document.getElementById('st-xp').textContent=G.xp||0;
  document.getElementById('st-days').textContent=(G.hist||[]).length;
  document.getElementById('st-best').textContent=G.best||0;
}
sdLoad();
</script>
